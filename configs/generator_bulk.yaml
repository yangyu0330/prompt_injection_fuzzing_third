      policy_requested: [annotate, block]
      seed_families: [replay_trajectory_injection, tool_agent_misuse, structured_payload_misuse]
      operator_chain: [delayed_replay_trigger, tool_hierarchy_abuse, memory_summary_poisoning]
      max_variants_per_seed: 4
      seed_selection_limit: 30

    config_sensitivity_probe:
      target_survivors: 80
