release_default:
  required_dims:
    - language
    - source_stage
    - directness
    - attack_family
  min_per_cell: 1

l2_runs:
  required_dims:
    - language
    - source_stage
    - directness
    - enforcement_mode
  min_per_cell: 1

ko_native_axes:
  required_dims:
    - language
    - attack_family
    - entry_point
  filters:
    language: ko
  min_per_cell: 1

ko_mutation_focus:
  required_dims:
    - language
    - source_stage
    - turn_mode
  filters:
    language: ko
    attack_family: ko_native_mutation_layer
  min_per_cell: 1

p0_stage_role:
  required_dims:
    - language
    - source_stage
    - source_role
    - expected_interpretation
  min_per_cell: 1
  required_values:
    source_role:
      values:
        - user
        - retrieved_doc
        - tool_output
      min_per_value: 1
    expected_interpretation:
      values:
        - instruction
        - data
      min_per_value: 1
  required_combinations:
    - source_stage: input
      source_role: user
      expected_interpretation: instruction
      min_count: 1
    - source_stage: tool_input
      source_role: tool_output
      expected_interpretation: data
      min_count: 1

p1_replay_tool_transition:
  required_dims:
    - turn_mode
    - source_stage
    - entry_point
    - attack_family
  filters:
    turn_mode: multi_turn
  min_per_cell: 1
  required_values:
    source_stage:
      values:
        - replay
        - tool_input
      min_per_value: 1
    entry_point:
      values:
        - memory_or_summary
        - tool_output
      min_per_value: 1
    tool_transition_type:
      values:
        - replay_to_tool
        - user_to_tool
      min_per_value: 1
  required_combinations:
    - turn_mode: multi_turn
      source_stage: replay
      entry_point: memory_or_summary
      attack_family: replay_trajectory_injection
      min_count: 1
    - turn_mode: multi_turn
      source_stage: tool_input
      entry_point: tool_output
      attack_family: structured_payload_misuse
      min_count: 1

bulk_full_family_set:
  required_dims:
    - attack_family
  filters:
    attack_or_benign: attack
  min_per_cell: 1
  required_values:
    attack_family:
      values:
        - direct_user_injection
        - indirect_document_web_rag
        - email_agent_injection
        - repo_coding_agent_injection
        - tool_agent_misuse
        - adaptive_fuzzing
        - ko_native_mutation_layer
        - korean_service_context
        - ko_detector_guardrail_track
        - replay_trajectory_injection
        - structured_payload_misuse
        - config_sensitivity_probe
      min_per_value: 1

repo_surface_axes:
  required_dims:
    - attack_family
    - entry_point
    - carrier_context
  filters:
    attack_or_benign: attack
  min_per_cell: 1
  required_values:
    entry_point:
      values:
        - search_result
        - file_text
      min_per_value: 1
    carrier_context:
      values:
        - repo_file
        - yaml
      min_per_value: 1
  required_combinations:
    - attack_family: indirect_document_web_rag
      entry_point: search_result
      carrier_context: repo_file
      min_count: 1
    - attack_family: indirect_document_web_rag
      entry_point: file_text
      carrier_context: repo_file
      min_count: 1
    - attack_family: repo_coding_agent_injection
      entry_point: file_text
      carrier_context: repo_file
      min_count: 1
    - attack_family: structured_payload_misuse
      carrier_context: yaml
      min_count: 1
    - attack_family: repo_coding_agent_injection
      carrier_context: yaml
      min_count: 1

config_probe_axes:
  required_dims:
    - attack_family
    - threshold_profile
    - normalization_variant
  filters:
    attack_or_benign: attack
  min_per_cell: 1
  enforce_cartesian: true
  required_values:
    attack_family:
      values:
        - config_sensitivity_probe
      min_per_value: 1
    threshold_profile:
      values:
        - baseline
        - strict
      min_per_value: 1
    normalization_variant:
      values:
        - baseline
        - normalization_ab_variant
      min_per_value: 1
  required_combinations:
    - attack_family: config_sensitivity_probe
      threshold_profile: baseline
      normalization_variant: baseline
      min_count: 1
    - attack_family: config_sensitivity_probe
      threshold_profile: strict
      normalization_variant: baseline
      min_count: 1
    - attack_family: config_sensitivity_probe
      threshold_profile: baseline
      normalization_variant: normalization_ab_variant
      min_count: 1
