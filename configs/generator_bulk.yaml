generator:
  mode: bulk
  seed: 20260409
  mutation_recipe_path: catalogs/mutation_recipes.yaml
  raw_generated_target: 5000
  survivor_target: 2000
  max_passes: 4

  output:
    out_dir: catalogs/generated_bulk
    export_jsonl: catalogs/generated_cases.jsonl
    shard_by: family
    max_rows_per_shard: 1000

  preflight:
    enabled: true
    build_config: configs/build_generated_dev.yaml
    fail_on_survivor_shortfall: true

  dedup_index:
    enabled: true
    path: catalogs/generated_bulk/indexes

  contrast_policy:
    defaults:
      bilingual_pairing: true
      require_benign: false
    families:
      tool_agent_misuse:
        require_benign: true
        benign_template_id: TMP-KO-BENIGN-STYLE-001
        benign_template_pool:
          - template_id: TMP-KO-BENIGN-STYLE-001
            when:
              source_role: [tool_output, memory_note]
              expected_interpretation: [data, analysis_target]
      replay_trajectory_injection:
        require_benign: true
        benign_template_id: TMP-KO-BENIGN-STYLE-001
        benign_template_pool:
          - template_id: TMP-KO-BENIGN-STYLE-001
            when:
              source_role: [memory_note, tool_output]
              expected_interpretation: [data, analysis_target]
      structured_payload_misuse:
        require_benign: true
        benign_template_id: TMP-KO-BENIGN-STYLE-001
        benign_template_pool:
          - template_id: TMP-KO-BENIGN-STYLE-001
            when:
              source_role: [tool_output]
              expected_interpretation: [data]
      repo_coding_agent_injection:
        require_benign: true
        benign_template_id: TMP-BENIGN-REPO-001
        benign_template_pool:
          - template_id: TMP-BENIGN-REPO-001
            when:
              source_role: [retrieved_doc]
          - template_id: TMP-BENIGN-YAML-001
            when:
              carrier_context: [yaml]

  refill:
    enabled: true
    strategy: coverage_deficit_first
    driving_profiles:
      - release_default
      - p1_replay_tool_transition
      - bulk_full_family_set
      - repo_surface_axes
      - config_probe_axes
    min_new_survivors_per_pass: 20

  families:
    tool_agent_misuse:
      target_survivors: 400
      max_raw_rows: 800
      max_bundles: 220
      priority: 100
      language_ratio:
        ko: 0.5
        en: 0.5
      benign_ratio_min: 0.2
      languages: [ko, en]
      entry_points: [tool_output, memory_or_summary, form_field]
      carriers: [tool_result, json, long_context_document, approval_form]
      source_roles: [tool_output, memory_note, user]
      expected_interpretations: [data]
      mutations: [tool_output_poisoning, memory_summary_poisoning, confirmation_bypass_framing]
      tool_transition_types: [user_to_tool, replay_to_tool]
      policy_requested: [annotate, block]
      seg_mutation_sensitive: true

    replay_trajectory_injection:
      target_survivors: 250
      max_raw_rows: 500
      max_bundles: 125
      priority: 95
      language_ratio:
        ko: 0.5
        en: 0.5
      benign_ratio_min: 0.2
      languages: [ko, en]
      entry_points: [memory_or_summary, tool_output]
      carriers: [long_context_document, json, tool_result]
      source_roles: [memory_note, tool_output]
      expected_interpretations: [data, analysis_target]
      mutations: [delayed_replay_trigger, memory_summary_poisoning]
      tool_transition_types: [replay_to_tool]
      replay_windows: [window_2, window_4]
      delayed_injection_turns: [2, 3]
      policy_requested: [annotate, block]
      seg_mutation_sensitive: true

    structured_payload_misuse:
      target_survivors: 200
      max_raw_rows: 400
      max_bundles: 100
      priority: 90
      language_ratio:
        ko: 0.5
        en: 0.5
      benign_ratio_min: 0.2
      languages: [ko, en]
      entry_points: [tool_output, form_field, file_text]
      carriers: [yaml, json, tool_result, approval_form, repo_file]
      source_roles: [tool_output]
      expected_interpretations: [data]
      mutations: [structured_payload_function_call, parameter_policy_manipulation, threshold_sweep_variant, normalization_ab_variant, yaml_wrapper]
      tool_transition_types: [user_to_tool]
      structured_payload_types: [function_call]
      threshold_profiles: [baseline, strict]
      normalization_variants: [baseline, normalization_ab_variant]
      policy_requested: [block]

    korean_service_context:
      target_survivors: 180
      max_raw_rows: 360
      max_bundles: 72
      priority: 80
      language_ratio:
        ko: 0.6
        en: 0.4
      languages: [ko, en]
      entry_points: [retrieved_document, email_body, quoted_reply, file_text]
      carriers: [markdown, email_thread, long_context_document, json, csv_like_table, table, ocr_text]
      source_roles: [retrieved_doc, assistant_quote]
      expected_interpretations: [data]
      mutations: [document_context_laundering, quoted_reply_footer_injection, table_csv_cell_injection, ocr_noise_indirect, bureaucratic_formal]
      policy_requested: [annotate, block]

